# AI Assistant translations - AI panel and features
# UI Areas: Right sidebar AI panel, Welcome modal, Diff viewer

ai:
  # ========================================
  # AI Panel - Right sidebar chat interface
  # ========================================

  panel:
    inputPlaceholder: 다이어그램에 대해 무엇이든 물어보세요...               # Chat input placeholder (empty state)
    currentChat: 현재 채팅        # Current chat section header
    previousChats: 이전 채팅          # Previous chats section header
    noOtherChats: 아직 다른 채팅 없음        # Empty state (no previous chats)
    sendInstructions: 보내려면 Enter를 누르고, 줄을 바꾸려면 Shift+Enter를 누르세요.   # Input hint (below chat box)
    sendMessage: 메시지 보내기      # Send button (tooltip)
    workspaceDisabled: 워크스페이스가 비활성화되었습니다.   # Disabled state message (no workspace)
    editPermissionRequired: 편집 권한이 필요합니다             # Permission error message
    usageLimitReached: 이번 달 사용량 한도를 모두 사용하셨습니다. 다음에 다시 시도해 주세요.                                  # Usage limit message
    learnMoreAboutUsageLimits: 사용량 한도에 대해 자세히 알아보기           # Link text (usage limit toast)
    chat: 채팅   # Chat tab label
    clickToEdit: 수정하려면 클릭하세요.  # Editable message label
    newChat: 새 채팅     # New chat button (sidebar header)
    showChatHistory: 채팅 기록 표시          # Toggle button (shows chat sidebar)
    hideChatHistory: 채팅 기록 숨기기         # Toggle button (hides chat sidebar)

  # ========================================
  # AI Welcome Modal - First-time user experience
  # ========================================
  welcome:
    title: dbdiagram AI에 오신 것을 환영합니다 # Welcome modal title
    subtitle: 데이터베이스 설계를 위한 지능형 비서                           # Welcome modal subtitle

  # ========================================
  # AI Loading States - Message states
  # ========================================
  messages:
    thinking: 생각 중...       # Loading indicator (AI thinking)
    generating: 생성 중...       # Loading indicator (schema generation)
    explaining: 설명 중...       # Loading indicator (explanation)
    error: 문제가 발생했습니다. 다시 시도해 주세요.                 # Error message (retryable)
    rateLimit: 사용 한도에 도달했습니다. 계속하려면 업그레이드하세요.                              # Rate limit message

  # ========================================
  # Diff Viewer - AI change comparison
  # ========================================
  diffViewer:
    reject: 거부   # Button (reject single change)
    accept: 수락   # Button (accept single change)
    rejectAll: 모두 거부      # Button (reject all changes)
    acceptAll: 모두 수락      # Button (accept all changes)

  # ========================================
  # Token Usage - AI usage tracking
  # ========================================
  tokenUsage:
    used: 사용된  # Usage counter label (left side)
    usageText: 사용량 한도 중 {percentage}을(를) 사용했습니다.              # Usage progress text
    tokens: 토큰     # Unit label (usage display)
    learnMore: 사용량 한도에 대해 자세히 알아보려면 클릭하세요.            # Tooltip (usage indicator)
    resetOn: 재설정      # Label (usage reset date)

  # ========================================
  # AI Response Details - Response metadata
  # ========================================
  assistant:
    dbmlCode: DBML 코드   # Label (code block header)
    lines: 줄    # Unit label (code lines count)

  # ========================================
  # AI Response Messages - Standard responses
  # ========================================
  responseMessages:
    noExplanation: 스키마가 업데이트되었습니다. 변경 사항을 검토하려면 diff 뷰어를 확인하세요.                      # Message after schema update
    invalidIntent: "dbdiagram AI에 오신 것을 환영합니다.\n\n저는 다음과 같은 일을 도와드리려고 왔습니다:\n\n• **DBML
      스키마 설계** - 테이블, 관계, 데이터베이스 구조 생성 및 수정\n• **데이터베이스 모범 사례** - 최적의 데이터 유형, 인덱스,
      제약 조건 제안\n• **스키마 최적화** - TableGroups로 테이블 구성, 타임스탬프 추가, 데이터 유형 다시 매핑\n• **빠른
      변환** - 데이터베이스 시스템(PostgreSQL, MySQL, SQL Server 등) 간 변환\n\n시작하려면 테이블을 만들거나,
      관계를 추가하거나, 위의 빠른 작업을 사용하도록 요청해 보세요."                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Help message (unrecognized command)

  # ========================================
  # Quick Action Titles - Action card headers
  # ========================================
  quickActionTitles:
    createTableGroups: 테이블 그룹 생성           # Quick action card 1 title
    addTimestampColumns: 타임스탬프 열 추가            # Quick action card 2 title
    addRelationships: 관계 추가             # Quick action card 3 title
    addIndexes: 인덱스 추가      # Quick action card 4 title
    learnDatabaseDesign: 데이터베이스 디자인 배우기        # Quick action card 5 title
    cloneSlack: Slack 클론 생성       # Quick action card 6 title
    documentDatabase: 문서 저장용 데이터베이스         # Quick action card 7 title
    todoList: 할 일 목록    # Quick action card 8 title
    remapDataTypes: 데이터 유형 다시 매핑     # Quick action card 9 title

  # ========================================
  # Quick Action Descriptions - Action card subtitles
  # ========================================
  quickActionDescriptions:
    createTableGroups: 고유한 색상을 사용하여 도메인 및 기능별로 테이블을 논리적 그룹으로 구성합니다.                                              # Card 1 description
    addTimestampColumns: 감사 추적이 필요한 테이블에 created_at 및 updated_at 열을 추가하세요.                           # Card 2 description
    addRelationships: 명명 규칙을 기반으로 외래 키 관계를 자동으로 감지하고 추가합니다.                                              # Card 3 description
    addIndexes: 외래 키와 자주 조회되는 열에 인덱스 블록을 추가합니다.                                 # Card 4 description
    learnDatabaseDesign: 데이터베이스 디자인에 대해 알아보기         # Card 5 description
    cloneSlack: Slack 클론 생성          # Card 6 description
    documentDatabase: 문서 저장용 데이터베이스 생성                     # Card 7 description
    todoList: 할 일 목록 애플리케이션 만들기              # Card 8 description
    remapDataTypes: 대상 데이터베이스 시스템과 일치하도록 데이터 유형을 변환합니다.                     # Card 9 description

  # ========================================
  # Quick Action Sub-actions - Database type selectors
  # ========================================
  quickActionSubActions:
    postgresql: PostgreSQL # Database selector option
    mysql: MySQL # Database selector option
    sqlServer: SQL Server # Database selector option
    sqlite: SQLite # Database selector option
    oracle: Oracle     # Database selector option
