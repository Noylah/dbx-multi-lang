      canEditAndInviteDesc: 사용자를 편집하고 초대할 수 있습니다.     # Permission description
      canEdit: 편집 가능    # Permission label
      canEditDesc: 편집할 수는 있지만 사람을 초대할 수는 없습니다.      # Permission description
      canView: 볼 수 있음   # Permission label
      canViewDesc: 볼 수는 있지만 편집할 수는 없습니다.   # Permission description
      remove: 제거   # Remove button
      removeDesc: 이 공동 작업자를 제거하세요.           # Remove description
