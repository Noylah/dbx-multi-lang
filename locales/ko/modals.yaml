# Modals translations - Modal dialogs throughout the app
# UI Areas: Share modal, Import modal, Export modal, History modal, Upgrade modals

modals:
  # ========================================
  # Generic modal titles - Common titles
  # ========================================
  titles:
    confirm: 확인    # Generic confirm modal title
    delete: 삭제     # Delete confirmation modal title
    remove: 제거   # Remove confirmation modal title
    rename: 이름 바꾸기 # Rename modal title

  # ========================================
  # Confirmation dialogs - Generic and specific
  # ========================================
  confirmation:
    default:
      message: 이 작업을 계속하시겠습니까?                             # Default confirmation message
      checkbox: 다시 표시하지 않음            # Checkbox to disable future confirmations
    deleteDiagram:
      message: 이 다이어그램을 삭제하시겠습니까? 이 작업은 취소할 수 없습니다.                                        # Delete diagram warning
      warning: 이 작업은 취소할 수 없습니다.                              # Additional warning
      embedLinkActive: 활성 내장 링크가 있습니다.                   # Warning about embed links
      lastViewed: 마지막으로 본     # Label for last viewed timestamp
    removeWorkspace:
    removeMember:
      title: 멤버 제거         # Remove member modal title
      message: 워크스페이스에서 이 멤버를 제거하시겠습니까?                                         # Remove member confirmation
      suggestion: 확인을 위해 이메일을 입력해주세요.                # Input prompt for confirmation

