      updatePasswordSuccess: 비밀번호를 성공적으로 업데이트했습니다.        # Success toast for password update
      diagramIsPublic: 이제 다이어그램이 공개되었습니다!     # Success toast for making diagram public
      diagramIsPrivate: 다이어그램은 이제 비공개입니다!       # Success toast for making diagram private
      diagramIsProtected: 이제 다이어그램이 보호됩니다!          # Success toast for making diagram protected
