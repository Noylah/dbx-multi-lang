      createDiagram: <b> 무제한 <br> 다이어그램 생성 </b> 및 기타 고급 기능을 이용하려면 지금 유료 플랜으로 
        업그레이드하세요!                                                                                                         # Description
      detailLevels: 지금 유료 플랜으로 업그레이드하여 세부 수준, 헤더 색상, <br> 테이블 그룹을 얻고 향후 모든 기능에 
        접근하세요!                                                                                                                            # Description
      detailLevelsDbdocs: 프로젝트를 업그레이드하여 세부 수준, 헤더 색상, <br> 테이블 그룹을 얻고 향후 모든 기능에 
        접근하세요!                                                                                                                         # DBDocs description
