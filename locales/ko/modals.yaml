        다이어그램 보기 </b> 및 기타 고급 기능을 이용하세요!                                                                                                                                  # Description
      headerColor: 지금 유료 플랜으로 업그레이드하여 세부 수준, 헤더 색상, <br> 관계 색상, 테이블 그룹을 얻고 향후 모든
        기능에 접근하세요!                                                                                                                                           # Description
      headerColorDbdocs: 프로젝트를 업그레이드하여 세부 수준, 헤더 색상, <br> 관계 색상, 테이블 그룹을 얻고 향후 
        모든 기능에 접근하세요!                                                                                                                                     # DBDocs description
      privateDiagram: <br> <strong> 비밀번호 보호, 개인 모드 </strong> 및 기타 고급 기능으로 다이어그램을
        보호하려면 지금 유료 플랜으로 업그레이드하세요!                                                                                                                                         # Description
      stickyNotes: 지금 유료 플랜으로 업그레이드하여 다이어그램에 <strong>스티커 메모</strong>를 포함하고<br>기타 고급 기능을 활용하세요!                                                                                                                                # Description
      stickyNotesDbdocs: 프로젝트를 업그레이드하여 다이어그램에 <strong>스티커 메모</strong>를 포함하고<br>기타 고급 기능을 활용하세요!                                                                                                                          # DBDocs description
      versionHistory: 다양한 <b> 스키마 버전 </b>을 사용하여 아이디어를 자유롭게 실험해 보세요. <br> 원할 때마다 
        이전 버전으로 롤백합니다.                                                                                                                      # Description
