  # ========================================
  # Private diagram - Password protection
  # ========================================
  private:
    protected: 보호된 다이어그램         # Protected badge
    private: 이 다이어그램은 비공개입니다.        # Private badge
    passwordRequired: 이 다이어그램을 보려면 비밀번호가 필요합니다.                 # Password required message
    noAccess: 이 다이어그램에 접근할 수 없습니다.                  # No access message
    enterPassword: 비밀번호를 입력하세요         # Password input placeholder
    incorrectPassword: 잘못된 비밀번호           # Incorrect password error
    tryAgain: 다시 시도해 주세요!       # Try again button
    viewDiagram: 다이어그램 보기     # View diagram button

  # ========================================
  # Publish modal - Publish to DBDocs
  # ========================================
  publish:
    title: 게시 대상      # Modal title (publish dropdown)
    reviewAndPublishTitle: '검토 및 게시 대상:'         # Modal title for review and publish modal
    dbdocsLink: DBDocs # Link label
