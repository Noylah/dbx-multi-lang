    bullet2: 게시된 문서는 내 이메일에 연결된 DBDocs 계정에서 사용할 수 있습니다.                                   # Feature bullet point
    bullet3: 다이어그램을 변경해도 DBDocs 문서는 자동으로 업데이트되지 않습니다.                                   # Feature bullet point
    publishNewOrUpdate: 새 DBDocs 문서 게시 / 기존 문서 업데이트                              # Section title
    updateExisting: 기존 문서 업데이트                  # Update option
    publishNewOption: 새 DBDocs 문서 게시                # Publish a new document option
