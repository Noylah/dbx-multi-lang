      aiAssistant: dbdiagram AI는 유료 기능입니다.        # AI assistant title
      tableGroup: 유료 기능을 발견했습니다!                 # Table group title
      tableGroupDbdocs: 유료 프로젝트의 특징을 발견하셨습니다!                      # DBDocs table group title
