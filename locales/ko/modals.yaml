      detailLevels: 유료 기능을 발견했습니다!                 # Detail levels title
      detailLevelsDbdocs: 유료 프로젝트의 특징을 발견하셨습니다!                      # DBDocs detail levels title
      diagramView: 다이어그램 보기를 추가하려면 유료 플랜이 필요합니다.                          # Diagram view title
      headerColor: 유료 기능을 발견했습니다!                 # Header color title
      headerColorDbdocs: 유료 프로젝트의 특징을 발견하셨습니다!                      # DBDocs header color title
      privateDiagram: 유료 기능을 발견했습니다!                 # Private diagram title
