      접근할 수 있습니다.                                                                                                    # Public default info
    documentProjectName: 문서 프로젝트 이름            # Project name field label
    enterProjectName: 프로젝트 이름을 입력하세요     # Project name placeholder
    options: 옵션      # Options section title
    ownerOnlyUpdatePublishDestination: 다이어그램 소유자만 게시 대상을 업데이트할 수 있습니다.                    # Non-owner message for selecting publish destination
    passwordProtection: 비밀번호 보호(선택사항)                  # Password section title
    passwordPlaceholder: 비밀번호를 입력하세요      # Password placeholder
    passwordMinLength: 비밀번호는 6자 이상이어야 합니다.                    # Password validation
    feedback: 우리에게 알려주세요       # Feedback label
    feedbackLink: 피드백      # Feedback link
    aboutThisFeature: 이 기능에 대해!           # Feedback link suffix
    errorLoadingProjects: 게시된 프로젝트를 로드하는 중 오류가 발생했습니다. 
      지원팀(dbdiagram{'@'}holistics.io)에 문의하세요.                                                                                              # Error toast
    errorPublishing: 프로젝트를 게시하는 동안 오류가 발생했습니다. dbdiagram{'@'}holistics.io(으)로 지원팀에 
      문의하세요.                                                                                                              # Error toast
    projectNameEmpty: 프로젝트 이름은 비워둘 수 없습니다.         # Validation error
    projectNameInvalid: 프로젝트 이름에는 알파벳, 숫자, 공백, "-" 또는 "_"만 포함할 수 있습니다.                           # Validation error
    projectNameExists: 이 이름/URL을 가진 프로젝트가 이미 존재합니다. 다른 이름을 선택하세요.                                   # Validation error for duplicate name/url
    passwordInvalid: 잘못된 비밀번호입니다. 다시 시도해 주세요!            # Validation error
