      publicPermissionUpdated: 다이어그램 공개 권한이 업데이트되었습니다!             # Success toast
      passwordLength: 비밀번호는 6~128자 사이여야 합니다.                        # Validation error
      cannotUpdateDiagramState: 다이어그램 상태를 업데이트할 수 없습니다.      # Error toast
      createPasswordFailed: 비밀번호 생성 실패             # Error toast
      updatePasswordFailed: 비밀번호 업데이트 실패           # Error toast
