    reload: 새로고침   # Reload button
    cannotGetPermission: 다이어그램 권한을 얻을 수 없습니다. 다시 시도해 주세요!                  # Error toast
    embedLink:
      title: 임베드 링크        # Embed link section title
      lastView: 마지막 보기    # Last viewed label
      customize: 옵션으로 임베드 링크를 사용자 지정하세요                    # Customize label
      darkMode: 다크 모드     # Dark mode toggle label
      highlightRelationships: 관계 강조                   # Highlight toggle label
      detailLevel: 세부 수준        # Detail level dropdown label
      anyoneWithLink: 링크가 있는 사람은 누구나 임베드된 다이어그램을 볼 수 있습니다.             # Help text
      remove: 이 임베드 링크를 제거하시겠습니까? 다른 사람들은 더 이상 해당 항목에 접근할 수 없습니다.                                      # Remove confirmation
      generate: 임베드 링크 생성            # Generate button
      errors:
        cannotGet: 임베드 링크를 가져올 수 없습니다. 다시 시도해 주세요!             # Error toast
        cannotCreate: 임베드 링크를 생성할 수 없습니다. 다시 시도해 주세요!               # Error toast
        cannotDelete: 임베드 링크를 제거할 수 없습니다. 다시 시도해 주세요!               # Error toast
        cannotUpdate: 임베드 링크 설정을 업데이트할 수 없습니다. 다시 시도해 주세요!                   # Error toast
    tooltip:
      viewOnly: 이 사용자 권한은 보기로만 제한됩니다.                            # Permission tooltip
      upgradePersonal: 편집 공동작업을 활성화하려면 개인 워크스페이스를 업그레이드하세요.                                       # Upgrade tooltip
      freeAccount: 이 사용자는 <b> 무료 </b> 계정을 가지고 있습니다.     # Free account tooltip
      editAfterUpgrade: 계정이 업그레이드된 후 다이어그램을 <b> 편집 </b>할 수 있습니다.                                         # Upgrade tooltip
      collaborationLimit: 다음과만 협업할 수 있습니다.              # Collaboration limit text
      diagramLimit: 각 다이어그램에는 최대 4명의 무료 사용자(현재 {count} 사용자)                      # Diagram limit text
