    learnMore: 자세히 알아보기   # Learn more link text
    ownerOnlyPublish: 다이어그램 소유자만 새 프로젝트를 DBDocs에 게시할 수 있습니다.                     # Non-owner message
    publishedProject: 게시된 프로젝트          # Label for published project
    viewExistingProjects: 기존 프로젝트 보기             # Link to view existing projects popover
    projectNameHeader: 이름   # Header for project name column in popover
    projectUrlHeader: URL # Header for project URL column in popover
    publishNewQuestion: 다른 프로젝트에 게시하고 싶으신가요?                # Prompt to publish to a new project
    publishNewAction: 새 프로젝트에 게시               # Action link text
    resolveConflictsAndErrorsBeforePublish: 게시하기 전에 모든 충돌과 오류를 해결하세요.                           # Hint to resolve all conflicts and errors before publishing
    currentChange: 현재 변화          # Current change conflict marker text
    incomingChange: 들어오는 변경 사항      # Incoming change conflict marker text
    bothChanges: 두 가지 변경 사항   # Both change conflict marker text
    acceptChangeButton: '{conflictTypeText} 수락'   # Accept change button
    acceptAllIncomingChangesButton: 들어오는 모든 변경 사항 수락            # Accept all incoming changes button
    conflictWordSingular: 갈등       # Word for counting conflicts
    conflictWordPlural: 갈등        # Word for counting conflicts

  # ========================================
  # Import modal - Import diagram
  # ========================================
  import:
    instructions: 지침           # Instructions section title
    showInstructions: 지침 표시             # Show instructions button
    hideInstructions: 지침 숨기기            # Hide instructions button
    upload: '{file} 업로드'  # Upload button label
    appendMode: 변환된 DBML을 마지막에 추가                # Append mode toggle
    modal:
      validating: 검증 중       # Validating modal title
    dbConnection:
      title: 직접 DB 연결에서 DBML 생성                      # CLI import modal title
      intro1: 이 방법은 데이터베이스에 직접 연결하고 데이터베이스 스키마(일반적으로 INFORMATION_SCHEMA에서)를 읽어 
        DBML 코드를 생성합니다.                                                                                                                                  # Intro text part 1
      intro2: 모든 것이 로컬 컴퓨터에서 실행되며 데이터베이스 자격 증명은 추적되거나 어디로도 전송되지 않습니다.                                               # Intro text part 2
      intro3: 코드는 오픈 소스입니다.                    # Intro text part 3
      intro3Link: 여기에서 확인할 수 있습니다       # Link text
      step1: 1. 설치      # Step 1 label
      step1Note: 추가해야 할 수도 있습니다        # Note text
      step1NoteSudo: Linux에서 명령을 내리기 전에            # Sudo note
      step2: 2. 다음 명령을 실행하세요             # Step 2 label
      exampleFor: 예           # Example label
      successMessage: '데이터베이스 연결에서 생성된 DBML 파일: database.dbml'                         # Success message
      successBigquery: '참고: BigQuery의 경우 JSON 사용자 인증 정보 파일에는 다음 키가 포함되어야 합니다.'                         # BigQuery note
      successSnowflake1: 연결을 시도하는 중...            # Snowflake step 1
      successSnowflake2: 쿼리 실행 중...         # Snowflake step 2
      successSnowflake3: 쿼리가 성공적으로 실행되었습니다.           # Snowflake step 3
      successSnowflake4: 연결이 성공적으로 끊어졌습니다.                  # Snowflake step 4
      step3: 3. 생성된 DBML을 복사하여 코드 패널에 붙여넣어 데이터베이스를 시각화합니다.                                       # Step 3 label
      databaseTypes:
        mysql: MySQL # Database type label
        postgres: PostgreSQL # Database type label
        mssql: SQL Server # Database type label
        oracle: Oracle     # Database type label
        snowflake: Snowflake # Database type label
        bigquery: BigQuery # Database type label

