# Account translations - Manage Account modal and Change Email flow
# UI Areas: Manage Account modal, Change Email modal (stepper flow)

account:
  # ========================================
  # Account page
  # ========================================
  page:
    title: 내 dbx 계정을 관리하세요
    description: "여기서 변경한 내용은 세 가지 서비스 모두에 반영됩니다."
    authenticating: 인증 중...

  # ========================================
  # Manage Account modal - Account settings overview
  # ========================================
  manage:
    loadingInfo: 계정 정보 로드 중...                  # Loading spinner text
    displayName: 표시 이름        # Label for display name field
    email: 이메일   # Label for email field

    # Connected accounts section
    connectedAccounts:
      title: 연결된 계정             # Section title
      noAccounts: 연결된 계정 없음             # Empty state text
      loggedInWith: '{provider}로 로그인됨'        # Provider badge label (e.g., "Logged in with Google")

    # Manage account section
    manageTitle: 계정 관리          # Section title
    changeEmail: 이메일 주소 변경            # Change email button label
    changeEmailInProgress: 이메일 변경이 진행 중입니다. 잠시 기다려 주세요.                      # Disabled message when email change is in progress
    changeEmailFailed: "마지막 이메일 변경에 실패했습니다. dbdiagram{'@'}holistics.io(으)로 지원팀에 문의하세요."                          # Disabled message when last email change failed

    # Account removal
    removal:
      removeAccount: 계정 삭제          # Remove account button label
      cancelRequest: 삭제 요청 취소               # Cancel removal request button label
      removedAfter: "계정은 {time} 후에 삭제됩니다."                   # Removal countdown text
      aFewHours: 몇 시간        # Time label when less than 1 day remaining
      aDay: 하루    # Time label when exactly 1 day remaining
      days: "{count}일"     # Time label for multiple days remaining
      cancelSuccess: 삭제 요청이 취소되었습니다!                            # Success toast after canceling
      status:
        inProgressTitle: 계정 삭제가 진행 중입니다.
        inProgressDescription: 이 작업은 몇 분 정도 걸릴 수 있습니다. 이 창을 안전하게 닫아도 됩니다. 프로세스는 
          백그라운드에서 계속됩니다.
        completedTitle: 계정이 성공적으로 삭제되었습니다.
        completedDescription: "이 창을 안전하게 닫아도 됩니다. 참고: 자동으로 로그아웃되지는 ​​않습니다. 다른 기기에서는
          수동으로 로그아웃하세요."
        failedTitle: 계정 삭제에 실패했습니다.
        failedContactSupport: 다음 주소로 지원팀에 문의하세요.

    notifications:
      profileUpdated: 사용자 프로필이 성공적으로 업데이트되었습니다.
      profileImageUpdated: 사용자 프로필 이미지가 업데이트되었습니다.
    profileImage:
      title: 사용자 프로필 이미지
      switchToGravatar: Gravatar의 프로필 이미지로 전환
      switchToGravatarHint: 사용자 아바타를 변경하려면 Gravatar의 프로필 이미지로 전환하세요.
      redirectingToGravatar: Gravatar로 리디렉션 중...
      changeOnGravatar: Gravatar에서 프로필 이미지 변경
      doneUploading: Gravatar에 이미지 업로드를 완료하셨나요?
      gravatarHint: 프로필 사진을 변경하려면 이메일로 Gravatar에 로그인하세요.
      refresh: 프로필 이미지 새로고침
    userInfo:
      title: 사용자 정보
    dangerZone:
      title: 위험지대
    errors:
      sessionExpired: 세션이 만료되었습니다. 다시 로그인해 주세요.
      updateProfileFailed: 사용자 프로필을 업데이트하지 못했습니다. 다시 시도해 주세요.
      loadProfileFailed: 사용자 프로필을 로드하지 못했습니다. 페이지를 새로고침해 보세요.
      updateProfileImageFailed: 사용자 프로필 이미지를 업데이트하지 못했습니다. 다시 시도해 주세요.
      cancelRemovalFailed: 계정 삭제 요청을 취소하지 못했습니다. 다시 시도해 주세요.

  # ========================================
  # Remove Account modal - 3-step account removal flow
  # ========================================
  removeAccountModal:
    title: 계정 삭제
    loadingAccountData: 계정 데이터 로드 중…
    steps:
      whatWillBeRemoved: 삭제될 내용
      verifyIdentity: 신원 확인
      identityVerified: 신원이 확인됨
      deleteAccount: 계정 삭제
      accountDeleted: 계정이 삭제되었습니다
    step1:
      description: "계정을 삭제하면 다음 데이터가 영구적으로 삭제됩니다."
      warning: 이 작업은 영구적이며 취소할 수 없습니다.
    step2:
      otpSentTo: 전송된 6자리 코드를 입력하세요.
      resendCode: 코드 재전송
      resendCodeCooldown: "코드 재전송( {seconds} s)"
    step3:
      description: 계정 및 모든 관련 데이터를 영구적으로 삭제하려고 합니다. 이 작업은 취소할 수 없습니다.
      confirmButton: 계정 삭제
    errors:
      generic: 문제가 발생했습니다. 다시 시도해 주세요.
      ssoAccount: SSO 계정은 개인 계정 설정을 관리할 수 없습니다.
      removalInProgress: 이미 삭제가 진행 중입니다.

  # ========================================
  # Change Email modal - 4-step email change flow
  # ========================================
  changeEmail:
    title: 이메일 변경       # Modal title

    # Step labels (stepper header)
    steps:
      verifyCurrentEmail: 현재 이메일 확인            # Step 1 title
      currentEmailVerified: 현재 이메일이 확인되었습니다.       # Step 1 completed label
      enterNewEmail: 새 이메일을 입력하세요    # Step 2 title
      verifyNewEmail: 새 이메일 확인         # Step 3 title
      newEmailVerified: 새 이메일이 확인되었습니다.    # Step 3 completed label
      confirmChange: 변경 확인          # Step 4 title
      emailChanged: 이메일이 변경되었습니다  # Step 4 completed label

    # Step 1: Verify current email
    verifyCurrent:
      description: 보안을 위해 현재 이메일 주소를 먼저 인증해야 합니다.                                    # Step 1 description
      currentEmailLabel: "현재 이메일:"        # Label before current email address
      sendCode: 코드 보내기    # Send OTP button
      otpSentMessage: 이메일로 6자리 코드를 보냈습니다. 코드는 4분 후에 만료됩니다.                             # OTP sent info text
      verificationCode: 인증코드              # OTP input label
      resendCode: 코드 재전송      # Resend button label
      resendCodeCooldown: "코드 재전송( {seconds} s)"     # Resend button with cooldown timer
      verify: 확인   # Verify OTP button

    # Step 2: Enter new email
    enterNew:
      description: "새 이메일 주소를 입력하세요. 본인의 것인지 확인하기 위해 인증 코드를 보내드립니다."                                     # Step 2 description
      newEmailLabel: 새 이메일 주소          # New email input label
      placeholder: 새 이메일을 입력하세요    # New email input placeholder
      sendCode: 코드 보내기    # Send OTP button

    # Step 3: Verify new email
    verifyNew:
      otpSentTo: 6자리 코드를 다음 주소로 보냈습니다.     # Text before new email address
      codeExpires: 코드는 4분 후에 만료됩니다.               # OTP expiry info
      verificationCode: 인증코드              # OTP input label
      resendCode: 코드 재전송      # Resend button label
      resendCodeCooldown: "코드 재전송( {seconds} s)"     # Resend button with cooldown timer
      back: 뒤로  # Back button to return to step 2
      verify: 확인   # Verify OTP button

    # Step 4: Confirm change
    confirm:
      description: "이메일 주소를 변경하려고 합니다:"                         # Step 4 description
      from: "현재 주소:"   # Label for current email in summary
      to: "새 주소:" # Label for new email in summary
      pleaseNote: "참고:"          # Notes section title
      noteNotifications: 새 이메일은 앞으로 모든 계정 알림(청구, 초대 등)을 받게 됩니다.                                                           # Note about notifications
      noteLogout: "자동으로 로그아웃되지는 ​​않습니다. 다른 기기에서는 수동으로 로그아웃하세요."                                        # Note about logout
      noteIrreversible: 이 작업은 취소할 수 없습니다.             # Note about irreversibility
      confirmButton: 변경 확인          # Confirm change button

    # Polling notifications for email change propagation
    polling:
      inProgressTitle: 여러 서비스에서 이메일을 업데이트하는 중...              # Notification title while syncing
      inProgressText: 이 작업은 몇 분 정도 걸릴 수 있습니다. 계속해서 앱을 사용할 수 있습니다.                        # Notification body while syncing
      completedText: 모든 서비스에서 이메일이 성공적으로 업데이트되었습니다!                  # Success notification
      failedTitle: 일부 서비스에서 새 이메일을 동기화하지 못했습니다.                 # Warning notification title
      failedText: 이메일이 변경되었지만 일부 서비스에서는 여전히 이전 이메일이 표시될 수 있습니다. 
        dbdiagram{'@'}holistics.io(으)로 지원팀에 문의하세요.                                                                                                     # Warning notification body

    # Error messages
    errors:
      invalidEmail: 유효한 이메일 주소를 입력하세요.                 # Invalid email format
      incorrectCode: 입력한 코드가 올바르지 않습니다.                # Wrong OTP code
      codeExpired: 인증 코드가 만료되었습니다. 새 코드를 요청하세요.                                # OTP expired
      codeAlreadyUsed: 이 코드는 이미 사용되었습니다. 새 코드를 요청하세요.                            # OTP already used
      requestExpired: 인증 요청이 만료되었습니다. 새 코드를 요청하세요.                                  # OTP request token expired
      emailInUse: 이 이메일은 이미 다른 계정에서 사용 중입니다.                      # Duplicate email
      verificationExpired: 인증이 만료되었습니다. 다시 시작하세요.                        # Verification token expired
      generic: 문제가 발생했습니다. 다시 시도해 주세요.                 # Fallback error
