# Header translations - Top header toolbar
# UI Areas: Header toolbar, Account dropdown, Status indicators, Publish modal

header:
  # ========================================
  # Header toolbar buttons - Left side of top header
  # ========================================
  buttons:
    save: 저장  # Blue button in header toolbar (saves current diagram - Ctrl/Cmd+S)
    share: 공유  # Share icon button in header toolbar (opens share modal)
    editAsNew: 새로 편집      # Option in header dropdown (duplicates diagram to personal workspace)
    signOut: 로그아웃     # Last item in account dropdown (top-right user menu)
    publishToDbdocs: DBDocs에 게시        # Button in header export dropdown
    publish: 게시      # Blue button in share modal (publishes current diagram to DBDocs)

  # ========================================
  # Draft badge - Small indicator next to diagram name
  # ========================================
  draftBadge:
    label: 초안    # Small badge showing "Draft" label (appears next to unsaved diagram name)
    discardAll: 모든 초안 삭제           # Button in draft dropdown (discards all draft versions)

  # ========================================
  # Placeholders - Input field placeholders
  # ========================================
  placeholders:
    untitledDiagram: 제목 없는 다이어그램      # Placeholder text in header diagram name input (when name is empty)

  # ========================================
  # Status - Diagram sync status indicators (header toolbar)
  # ========================================
  status:
    readOnly: 읽기 전용     # Status label when viewing read-only diagram (gray text)
    synced: 동기화됨   # Status label showing all changes synced (green dot + text)
    unsynced: 동기화되지 않음 # Status label when changes pending sync (yellow dot + text)
    saved: 저장됨   # Status label when diagram saved (blue text)
    unsaved: 저장되지 않음 # Status label with unsaved indicator (orange text)

  # ========================================
  # Sync status - Detailed sync messages (header toolbar tooltip/status)
  # ========================================
  syncStatus:
    reconnecting: 다시 연결하는 중...    # Toast message when reconnecting to server
    saving: 다이어그램 저장 중...     # Toast message during manual save
    autoSaving: 다이어그램 자동 저장 중...       # Toast during auto-save
    disconnected: 연결이 끊어졌습니다. 편집 내용은 로컬에 저장되며 다음에 온라인 상태가 되면 서버와 동기화됩니다.                                                                    # Toast when offline
    readOnly: 이 다이어그램은 읽기 전용입니다.        # Toast explaining read-only state
    unsaved: 이 다이어그램은 저장되지 않았습니다.      # Toast when diagram has unsaved changes
    unsavedWithLogin: 이 다이어그램은 저장되지 않습니다. 다이어그램을 저장하려면 로그인이 필요합니다                        # Toast prompting login for saving

  # ========================================
  # Tooltips - Tooltip text for header elements
  # ========================================
  tooltips:
    clickToEdit: 편집하려면 클릭하세요   # Tooltip on diagram name (when hovering)
    openInDbdocs: DBDocs에서 열기    # Tooltip on DBDocs link icon
    noPublishedContent: 이 프로젝트에는 아직 게시된 콘텐츠가 없습니다.                # Tooltip on empty DBDocs link
    editAsNewDisabledWorkspace: <p class="text-center"><b>새로 편집</b>은 구독 취소로 인해 워크스페이스가 비활성화되어 사용할 수 없습니다.</p> # Tooltip explaining disabled Edit as New
    editAsNewNormal: 새로 편집      # Tooltip on Edit as New button (normal state)

  # ========================================
  # Draft status - Draft version status messages
  # ========================================
  draftStatus:
    upToDate: 초안이 최신 상태입니다.       # Status text when draft matches published version
    hasUnsavedChanges: 초안에 저장되지 않은 변경사항이 있습니다.   # Status text when draft has changes

  # ========================================
  # Project status - Published project status messages
  # ========================================
  projectStatus:
    upToDate: 프로젝트가 최신 상태입니다.       # Status when published project matches draft
    hasUnsavedChanges: 프로젝트에 저장되지 않은 변경사항이 있습니다.   # Status when draft not published
    synchronized: 다이어그램 콘텐츠가 서버와 동기화됩니다.                               # Status confirming sync
    allChangesSaved: 모든 변경사항이 저장되었습니다. # Toast when everything saved

  # ========================================
  # Publish validation - Messages in share/publish modal
  # ========================================
  publishValidation:
    parseError: 다이어그램에 오류가 있습니다. 게시하기 전에 먼저 모든 구문 오류를 수정하세요.                                            # Error in share modal when DBML has errors
    saveFirst: 먼저 다이어그램을 저장하세요.               # Error when trying to publish unsaved diagram
    ownerPublishFirst: 먼저 다이어그램 소유자에게 DBDocs 문서를 게시하도록 요청하세요.                             # Error for collaborators without publish rights
    needLogin: 변경사항을 게시하려면 로그인하세요.                  # Error when publishing without authentication
    hasErrors: 다이어그램에 오류가 있습니다                 # Error summary in publish modal
    noChanges: 게시할 변경사항 없음           # Info when diagram unchanged

  # ========================================
  # Modals - Modal dialog texts (discard, overwrite)
  # ========================================
  modals:
    discardDraftsTitle: 모든 초안 삭제           # Modal title (discard drafts confirmation)
    discardDraftsContent: 모든 초안 버전을 삭제하고 프로젝트의 최신 콘텐츠를 가져오시겠습니까? 이 작업은 취소할 수 
      없습니다.                                                                                                                                                   # Modal warning text
    discardButton: 삭제     # Primary button in discard modal (red)
    cancelButton: 취소     # Secondary button (gray)

  # ========================================
  # Notifications - Toast notification messages
  # ========================================
  notifications:
    publishSuccess: 프로젝트가 성공적으로 게시되었으며 초안 버전이 삭제되었습니다.                        # Success toast after publish
    publishFailed: 프로젝트를 게시하지 못했습니다.         # Error toast when publish fails
    discardSuccess: 모든 초안이 삭제되고 최신 버전이 로드되었습니다.                    # Success toast after discard
    discardFailed: 초안을 삭제하지 못했습니다.          # Error toast when discard fails
    showPublishFailed: 게시 확인을 표시하지 못했습니다.                  # Error toast when publish modal fails to open
    renameFailed: 다이어그램 이름을 바꾸지 못했습니다. 다시 시도해 주세요            # Error toast on rename failure

  # ========================================
  # Account dropdown - Top-right user menu
  # ========================================
  accountDropdown:
    loggedInWithSSO: SSO로 로그인됨          # Label showing SSO login status (top-right menu)
    darkMode: 다크 모드     # Toggle switch label for dark mode theme
    managePersonalPlan: 개인 플랜 관리             # Link to billing/subscription management
    manageAccount: 계정 관리          # Link to account settings page
