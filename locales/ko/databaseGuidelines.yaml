# Database Guidelines translations - Import instructions
# UI Areas: Import modal, Database connection instructions

databaseGuidelines:
  # ========================================
  # MySQL Import - MySQL-specific instructions
  # ========================================
  mysql:
    title: MySQL # Database selector option (import modal)
    install: 설치    # Install link text
    tool: mysqldump # Tool name
    terminalCommand: 터미널에서 다음 명령을 실행하세요.                       # Instruction (command block)
    linuxPrefix: Linux에서는 다음을 추가해야 할 수도 있습니다.   # Linux-specific note
    sudo: sudo # Sudo command
    linuxSuffix: 그 전에      # Sudo placement hint
    example: 예       # Command block label
    step3: 덤프된 SQL 콘텐츠를 복사하여 이 모달에 붙여넣습니다.                          # Final step instruction

  # ========================================
  # PostgreSQL Import - PostgreSQL-specific instructions
  # ========================================
  postgres:
    title: PostgreSQL # Database selector option (import modal)
    install: 설치    # Install link text
    tool: pg_dump # Tool name
    terminalCommand: 터미널에서 다음 명령을 실행하세요.                       # Instruction (command block)
    linuxPrefix: Linux에서는 다음을 추가해야 할 수도 있습니다.   # Linux-specific note
    sudo: sudo # Sudo command
    linuxSuffix: 그 전에      # Sudo placement hint
    example: 예       # Command block label
    step3: 덤프된 SQL 콘텐츠를 복사하여 이 모달에 붙여넣습니다.                          # Final step instruction

  # ========================================
  # CSV Import - CSV file instructions
  # ========================================
  csv:
    title: CSV # Database selector option (import modal)
    description: DBML 테이블 구조를 자동으로 생성하려면 CSV 파일을 업로드하세요. 첫 번째 행에는 열 헤더가 포함되어야 
      합니다.                                                                                                                       # Import description
    exampleFormat: CSV 형식의 예          # Example section header

  # ========================================
  # Rails Import - Rails schema.rb instructions
  # ========================================
  rails:
    title: Rails schema.rb      # Database selector option (import modal)
    step1: 열기       # Instruction step 1 prefix
    schemaRb: schema.rb    # File name (code font)
    step1Suffix: 코드 편집기를 사용하여 프로젝트 파일                       # Instruction step 1 suffix
    step2: schema.rb 내용을 복사하여 이 모달에 붙여넣으세요.                       # Instruction step 2

  # ========================================
  # SQL Server Import - SQL Server instructions
  # ========================================
  sqlServer:
    title: SQL Server # Database selector option (import modal)
    step1: 다운로드 및 설치            # Instruction step 1 prefix
    tool: SQL Server Management Studio           # Tool name
    step1Suffix: SSMS # Tool abbreviation
    step2: SSMS를 열고 SQL Server에 연결                      # Instruction step 2
    step3: 연결되면 내보낼 데이터베이스를 마우스 오른쪽 버튼으로 클릭하고 선택하세요.                           # Instruction step 3 prefix
    scriptDatabaseAs: Script Database as        # Menu option name
    createTo: CREATE To     # Menu option continuation
    newQueryEditorWindows: New Query Editor Windows               # Sub-menu option
    step4: 덤프된 SQL 콘텐츠를 복사하여 이 모달에 붙여넣습니다.                          # Instruction step 4

  # ========================================
  # Oracle Import - Oracle database instructions
  # ========================================
  oracle:
    title: Oracle     # Database selector option (import modal)
    description: 다음 명령을 직접 실행한 후 다음을 사용하여 SQL 파일을 업로드합니다.                              # Description intro
    uploadSql: .SQL 업로드    # Upload button label
    createDirectory: Oracle에서 디렉터리 개체 만들기                # Command 1 description
    grantPrivileges: 디렉터리 개체에 대한 읽기 및 쓰기 권한을 부여합니다.                          # Command 2 description
    exportSchema: 특정 스키마를 덤프 파일로 내보내기                     # Command 3 description
    convertDump: 덤프 파일을 SQL 파일로 변환                 # Command 4 description

  # ========================================
  # Snowflake Import - Snowflake database instructions
  # ========================================
  snowflake:
    title: Snowflake # Database selector option (import modal)
    description: 실행      # Description intro
    getDdl: GET_DDL # Command name
    descriptionSuffix: 직접 명령을 내린 다음 출력을 복사하여 화면의 텍스트 입력에 붙여넣거나 파일에 저장하고 다음을 사용하여
      업로드합니다.                                                                                                                                     # Description suffix
    uploadSql: .SQL 업로드    # Upload button label
    exportAllTables: 전체 데이터베이스에 대한 모든 테이블 DDL 내보내기                        # Feature description
    selectSchema: 단일 스키마의 모든 테이블 선택                    # Feature description
