# Billing translations - Pricing, subscriptions, payment
# UI Areas: Pricing page, Billing settings, Upgrade modals

billing:
  # ========================================
  # Billing Buttons - Action buttons
  # ========================================
  buttons:
    upgrade: 업그레이드     # Generic upgrade button
    upgradeToPersonalPro: Personal Pro 플랜으로 업그레이드      # CTA button (pricing page)
    collaborateWithTeam: 팀 플랜으로 협업                  # CTA button (team plan)

  # ========================================
  # Pricing Page - Pricing table
  # ========================================
  pricing:

  # ========================================
  # Plan Details - Individual plan info
  # ========================================
  plans:
    free:
      features:
      - 최대 3개의 다이어그램       # Feature list item 1
      - 기본 편집 도구              # Feature list item 2
      - SQL/PNG로 내보내기       # Feature list item 3
      - 커뮤니티 지원             # Feature list item 4

    pro:
      features:
      - 무제한 다이어그램            # Feature list item 1
      - 고급 편집 도구                 # Feature list item 2
      - 버전 기록             # Feature list item 3
      - 우선 지원              # Feature list item 4
      - PDF로 내보내기       # Feature list item 5
      - 맞춤 테마           # Feature list item 6

    team:
      features:
      - 프로의 모든 것            # Feature list item 1
      - 팀 협업                 # Feature list item 2
      - 관리 제어            # Feature list item 3
      - SSO 인증               # Feature list item 4
      - 우선 지원              # Feature list item 5
      - 맞춤형 통합                # Feature list item 6

  # ========================================
  # Payment Form - Credit card inputs
  # ========================================
  payment:
    paymentMethod: 결제수단           # Section label (existing cards)

  # ========================================
  # Billing History - Invoice section
  # ========================================
  billing:

  # ========================================
  # Subscription Management - Subscription actions
  # ========================================
  subscription:

  # ========================================
  # Personal Pro Plan - Plan features list
  # ========================================
  personalPro:

  # ========================================
  # Team Plan - Plan features list
  # ========================================
  team:

  # ========================================
  # Public Pricing - Public pricing page
  # ========================================
  publicPricing:

  # ========================================
  # Upgrade Button - Contextual upgrade
  # ========================================
  upgradeNowBtn:
    ownerOnly: 워크스페이스 소유자만 팀 플랜으로 업그레이드할 수 있습니다.                     # Disabled tooltip

  # ========================================
  # Manage Plan Modal - Subscription details
  # ========================================
  managePlanModal:
    loadingSubscription: 구독 정보 로드 중...                       # Loading skeleton text
    currentPlan: 현재 플랜        # Section header
    personalPlanForever: 개인 플랜 - 영원히             # Plan name display
    unknownPlan: 알 수 없는 플랜    # Fallback plan name
    billedMonthly: 매달 청구됨             # Billing frequency
    billedAnnually: 매년 청구됨            # Billing frequency
    chargeEvery: '{period} {unit}마다 청구'       # Charge description
    cancelledOn: 취소 날짜        # Cancellation date label
    planDetails: 플랜 세부정보 →      # Link to plan features
    upgradeDescription: 세부 수준, 헤더 색상, 앞으로 추가될 기능을 사용하려면 유료 플랜으로 업그레이드하세요.                                       # Upgrade prompt
    nextPayment: 다음 결제 예정일    # Payment section header
    chargedOn: 청구 예정            # Payment date suffix
    editSubscription: 구독 수정             # Button (payment method)
    switchToMonthly: 월별 결제로 전환                 # Toggle option
    switchToYearly: 연간 결제로 전환                # Toggle option (savings)
    noPaymentMethod: 결제 수단 없음          # Empty state label
    updatePaymentMethod: 결제 수단 업데이트            # Button (add card)
    invoicing: 인보이스 발행   # Section header
    lastPayment: 마지막 결제       # Section header
    editBillingInfo: 결제 정보 수정                 # Button (billing details)
    paymentProcessing: 결제가 처리 중입니다. 몇 분 후에 페이지를 새로고침해 주세요.                                  # Processing toast

  # ========================================
  # Disabled Card - Disabled workspace state
  # ========================================
  disabledCard:
    personalUpgrade: 프리미엄 기능을 사용하려면 개인 워크스페이스를 업그레이드하세요.                    # Upgrade prompt
    teamReadOnly: 구독 취소로 인해 워크스페이스가 읽기 전용 모드입니다. 워크스페이스 기능을 활성화하려면 갱신하세요.                                                 # Reactivation prompt

  # ========================================
  # Plan Picking View - Simple pricing view
  # ========================================
  planPickingSimpleView:
    collaborateWithTeamPlan: 팀 플랜으로 협업                  # Section header
    collaborateWithColleagues: 동료와 함께 협업하세요.                       # Section subtitle
    manageTeamDiagrams: 팀의 다이어그램을 모두 한 곳에서 관리하세요.                # Benefit text
    startFreeTrial: 7일 무료 평가판 시작           # CTA button
    learnMore: 자세히 알아보기   # Link (learn more)
    pricingFrom: '가격: {currency} {price}/월'           # Pricing label
